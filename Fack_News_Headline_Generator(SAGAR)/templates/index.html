
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breaking Bindaas Times</title>
<style>
:root {
  --bg: #0f172a;
  --text: #e5e7eb;
  --card: #020617cc;
}
.light {
  --bg: #f8fafc;
  --text: #020617;
  --card: #ffffffdd;
}
* { box-sizing: border-box; cursor: none; }
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}
video {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: -2;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
}
.logo {
  font-weight: 700;
  letter-spacing: 1px;
}
.main {
  max-width: 720px;
  margin: 60px auto;
  background: var(--card);
  border-radius: 18px;
  padding: 32px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
h1 { margin-top: 0; font-size: 2.2rem; }
.headline {
  font-size: 1.4rem;
  margin: 24px 0;
  min-height: 70px;
}
button {
  padding: 12px 22px;
  border: none;
  border-radius: 999px;
  font-size: 1rem;
  cursor: pointer;
}
.btn {
  background: #22c55e;
  color: #020617;
}
.toggle {
  background: #38bdf8;
}
.popular {
  margin-top: 28px;
  text-align: left;
}
.popular h3 {
  margin-bottom: 10px;
}
.popular li {
  margin-bottom: 6px;
  opacity: 0.9;
}
.cursor {
  width: 14px;
  height: 14px;
  border: 2px solid #22c55e;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: transform 0.08s ease;
}
</style>
</head>
<body>
<video autoplay muted loop>
  <source src="/static/bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>
  <div class="logo">📰 Fack News Generator</div>
  <button class="toggle" onclick="toggleMode()">Dark / Light</button>
</header>

<div class="main">
  <h1>Breaking Bindaas Times 🐸</h1>
  <div id="headline" class="headline">Click regenerate to get fresh fake news!</div>
  <button class="btn" onclick="regen()">Regenerate News</button>

  <div class="popular">
    <h3>🔥 Popular Fake Headlines</h3>
    <ul>
      {% for p in popular %}
      <li>{{p}}</li>
      {% endfor %}
    </ul>
  </div>
</div>

<div class="cursor" id="cursor"></div>

<script>
function regen(){
  fetch("/generate")
    .then(r => r.json())
    .then(d => document.getElementById("headline").innerText = d.headline);
}
function toggleMode(){
  document.body.classList.toggle("light");
}
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>
</body>
</html>
